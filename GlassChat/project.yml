name: GlassChat
options:
  bundleIdPrefix: com.glasschat
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_FILE: GlassChat/Info.plist
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: "1.0.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.glasschat.app
targets:
  GlassChat:
    type: application
    platform: iOS
    sources:
      - GlassChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glasschat.app
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        CODE_SIGN_STYLE: Automatic
    info:
      path: GlassChat/Info.plist
      properties:
        CFBundleDisplayName: GlassChat
        NSLocalNetworkUsageDescription: GlassChat uses the local network to message nearby devices without the internet.
        NSBonjourServices:
          - _glass-chat._tcp
          - _glass-chat._udp
        UIBackgroundModes:
          - bluetooth-central
          - bluetooth-peripheral
  GlassChatTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GlassChatTests
    dependencies:
      - target: GlassChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glasschat.app.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  GlassChat:
    build:
      targets:
        GlassChat: all
        GlassChatTests: [test]
    test:
      targets:
        - GlassChatTests
